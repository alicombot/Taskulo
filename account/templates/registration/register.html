<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="icon" href="./images/svg_icon/logo.svg">
    <link rel="stylesheet" href="./styles/normalize.css">
    <link rel="stylesheet" href="./styles/gird.css">
    <link rel="stylesheet" href="./styles/fonts.css">
    <link rel="stylesheet" href="./styles/landing-page.css">
    <link rel="stylesheet" href="./styles/responsive.css">
</head>
<body>
<header class="header">
    <div class="container">
        <nav class="nav">
            <div class="nav__logo">
                ToDo-List
                <svg width="24" height="26" viewBox="0 0 24 26" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M24 8.88887L14 4V5.46663L22.5 9.62219L14 13.7777V26L24 21.1111V8.88887Z" fill="white"/>
                    <path d="M0 17.1111L10 22V20.5334L1.49996 16.3778L10 12.2223V0L0 4.88888V17.1111Z" fill="white"/>
                </svg>
            </div>
            <div class="nav__content">
                <ul class="menu ">
                    <li class="menu__item menu__item--active">
                        <a href="./landing-page.html" class="menu__link">Home</a>
                    </li>
                    <li class="menu__item"><a href="./landing-page.html" class="menu__link">About us</a></li>
                    <li class="menu__item"><a href="./landing-page.html" class="menu__link">Our feature</a></li>
                    <li class="menu__item"><a href="./landing-page.html" class="menu__link">How it works</a></li>
                    <li class="menu__item"><a href="./landing-page.html" class="menu__link">Contact Us</a></li>
                </ul>
                <div class="nav__btn">
                    <div class="nav__btn--login"><a href="./login.html">Login</a></div>
                    <div class="nav__btn--signup"><a href="./register.html">Sign Up</a></div>
                </div>
            </div>
        </nav>
    </div>
</header>

<main class="main" style="background:#f3f6fd; min-height: calc(100vh - 72px);">
    <div class="container" style="display:flex; align-items:center; justify-content:center; padding:4rem 0;">
        <div style="background:#fff; width:100%; max-width:44rem; border-radius:1.6rem; padding:2.4rem; box-shadow:0 10px 30px rgba(0,0,0,0.06);">
            <div class="section-head" style="margin-bottom:1.5rem;">
                <h3 class="section-title" style="width:auto;">Create your account</h3>
                <div class="section-line"></div>
            </div>
            <form>
                <div class="account-field">
                    <label class="labe__account" for="name">Name</label>
                    <input id="name" type="text" class="panel-account__input" placeholder="Enter your name" style="display:block; background:#f9f9fb; border:.1rem solid #d3d6e4;">
                </div>
                <div class="account-field">
                    <label class="labe__account" for="email">Email</label>
                    <input id="email" type="email" class="panel-account__input" placeholder="Enter your email" style="display:block; background:#f9f9fb; border:.1rem solid #d3d6e4;">
                </div>
                <div class="account-field">
                    <label class="labe__account" for="password1">Password</label>
                    <input id="password1" type="password" class="panel-account__input" placeholder="Create a password" style="display:block; background:#f9f9fb; border:.1rem solid #d3d6e4;">
                </div>
                <div class="account-field">
                    <label class="labe__account" for="password2">Confirm password</label>
                    <input id="password2" type="password" class="panel-account__input" placeholder="Confirm your password" style="display:block; background:#f9f9fb; border:.1rem solid #d3d6e4;">
                </div>
                <button class="start-planing__btn" type="submit" style="width:100%;">Create account</button>
            </form>
            <p class="section-caption" style="width:auto; text-align:center; margin-top:1.5rem;">Already have an account? <a href="./login.html" style="color:#775ee9;">Login</a></p>
        </div>
    </div>
</main>
</body>
</html>
