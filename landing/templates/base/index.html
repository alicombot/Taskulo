{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskulo | {% block title %}{% endblock %}</title>
    <link rel="icon" href="{% static 'images/svg_icon/logo.svg' %}">
    <script>
        (function () {
            var stored = localStorage.getItem('taskulo-theme');
            var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (stored === 'dark' || (!stored && prefersDark)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            corePlugins: { preflight: {% block tailwind_preflight %}false{% endblock %} },
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f3f0ff',
                            100: '#e8e4ff',
                            200: '#d4ccff',
                            400: '#8b72ed',
                            500: '#775ee9',
                            600: '#6b54e0',
                            700: '#5d49c8',
                            navy: '#1d233d',
                            surface: '#f3f6fd',
                        },
                    },
                    boxShadow: {
                        'brand': '0 20px 50px -12px rgba(119, 94, 233, 0.35)',
                    },
                },
            },
        };
    </script>
    <link rel="stylesheet" href="{% static 'css/landing.css' %}">
    {% block legacy_styles %}
    <link rel="stylesheet" href="{% static 'css/normalize.css' %}">
    <link rel="stylesheet" href="{% static 'css/gird.css' %}">
    <link rel="stylesheet" href="{% static 'css/fonts.css' %}">
    <link rel="stylesheet" href="{% static 'css/landing-page.css' %}">
    <link rel="stylesheet" href="{% static 'css/responsive.css' %}">
    {% endblock %}
    {% block extra_head %}{% endblock %}
</head>

<body class="font-sans antialiased bg-brand-surface text-[#1C1D22] dark:bg-[#0f1219] dark:text-[#e8eaf0] transition-[background-color,color] duration-300 ease-out {% block body_class %}{% endblock %}">
{% include 'landing_partials/header.html' %}
{% block content %}{% endblock %}
<script src="{% static 'js/theme.js' %}"></script>
<script src="{% static 'js/landing.js' %}"></script>
<script src="{% static 'js/verify-email.js' %}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
