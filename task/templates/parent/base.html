{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskulo | {% block title %}{% endblock %}</title>
    <link rel="icon" href="{% static 'images/svg_icon/logo.svg' %}">
    <script>
        (function () {
            var stored = localStorage.getItem('taskulo-theme');
            var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (stored === 'dark' || (!stored && prefersDark)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f3f0ff',
                            100: '#e8e4ff',
                            200: '#d4ccff',
                            400: '#8b72ed',
                            500: '#775ee9',
                            600: '#6b54e0',
                            700: '#5d49c8',
                            navy: '#1d233d',
                            surface: '#f3f6fd',
                        },
                        ink: {
                            DEFAULT: '#1C1D22',
                            muted: 'rgba(28, 29, 34, 0.55)',
                        },
                    },
                    boxShadow: {
                        'brand': '0 20px 50px -12px rgba(119, 94, 233, 0.28)',
                        'panel': '0 8px 32px rgba(119, 94, 233, 0.12), 0 2px 8px rgba(0, 0, 0, 0.06)',
                        'card': '0 1px 2px rgba(28, 29, 34, 0.04), 0 8px 24px rgba(28, 29, 34, 0.06)',
                        'card-dark': '0 1px 2px rgba(0, 0, 0, 0.2), 0 8px 24px rgba(0, 0, 0, 0.35)',
                    },
                    animation: {
                        'fade-up': 'fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards',
                        'slide-in': 'slideIn 0.35s cubic-bezier(0.22, 1, 0.36, 1) forwards',
                    },
                    keyframes: {
                        fadeUp: {
                            '0%': { opacity: '0', transform: 'translateY(12px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        slideIn: {
                            '0%': { opacity: '0', transform: 'translateX(-8px) scale(0.98)' },
                            '100%': { opacity: '1', transform: 'translateX(0) scale(1)' },
                        },
                    },
                },
            },
        };
    </script>
    <link rel="stylesheet" href="{% static 'task/css/dashboard.css' %}?v=20250746">
    {% block extra_head %}{% endblock %}
</head>
<body class="dashboard-body">
    <div class="app-shell">
        {% include 'partials/sidebar.html' %}
        <div class="wrapper">
            {% include 'partials/header.html' %}
            {% block content %}{% endblock %}
        </div>
    </div>

    <div class="mobile-project-picker" id="mobile-project-picker" hidden>
        <button type="button" class="mobile-project-picker__backdrop" id="mobile-project-picker-backdrop" aria-label="Close project list"></button>
        <div class="mobile-project-picker__sheet" role="dialog" aria-modal="true" aria-label="Switch project">
            <div class="mobile-project-picker__handle" aria-hidden="true"></div>
            <div class="mobile-project-picker__head">
                <div>
                    <p class="mobile-project-picker__eyebrow">Workspace</p>
                    <h3 class="mobile-project-picker__title">Switch project</h3>
                </div>
                <button type="button" class="mobile-project-picker__close" id="mobile-project-picker-close" aria-label="Close">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
                </button>
            </div>
            <ul class="mobile-project-picker__list" id="mobile-project-picker-list"></ul>
            <button type="button" class="mobile-project-picker__manage" id="mobile-project-picker-manage">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
                Manage in sidebar
            </button>
        </div>
    </div>

    <div class="app-confirm" id="app-confirm" hidden>
        <button type="button" class="app-confirm__backdrop" id="app-confirm-backdrop" aria-label="Close dialog"></button>
        <div class="app-confirm__dialog" role="alertdialog" aria-modal="true" aria-labelledby="app-confirm-title" aria-describedby="app-confirm-message">
            <div class="app-confirm__icon" aria-hidden="true">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
            </div>
            <h3 class="app-confirm__title" id="app-confirm-title">Delete task?</h3>
            <p class="app-confirm__message" id="app-confirm-message"></p>
            <div class="app-confirm__actions">
                <button type="button" class="app-confirm__btn app-confirm__btn--ghost" id="app-confirm-cancel">Cancel</button>
                <button type="button" class="app-confirm__btn app-confirm__btn--danger" id="app-confirm-confirm">Delete</button>
            </div>
        </div>
    </div>

    <script type="module" src="{% static 'task/js/app.js' %}?v=20250746"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
